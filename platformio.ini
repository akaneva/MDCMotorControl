; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


; GLOBAL SETTINGS (Applied to all environments)

[env]
platform = ststm32
board = olimex_e407
framework = stm32cube
lib_ldf_mode = deep+

; Shared build flags and include paths
build_flags = 
    -D HSE_VALUE=12000000U
    -I src/hal
    -I lib/SEGGER_RTT
    -I include
    -I lib/LwIP/src/include
    -I lib/LwIP/system
    -I lib/LwIP/src/include/netif
    -I lib/LwIP/src/include/lwip
    -I lib/LwIP/src/include/lwip/apps
    -I lib/LwIP/src/include/lwip/priv

; Force PlatformIO to compile LwIP .c files from the lib/ folder
build_src_filter = 
    +<*> 
    +<../lib/LwIP/src/core/*.c>
    +<../lib/LwIP/src/core/ipv4/*.c>
    +<../lib/LwIP/src/netif/*.c>
    +<../lib/LwIP/src/api/*.c>
    +<../lib/LwIP/src/apps/*/*.c>

; ==========================================================
; ENVIRONMENT 1: SEGGER J-LINK
; ==========================================================
[env:jlink_debug]
extends = env
upload_protocol = jlink
debug_tool = jlink
upload_speed = 12000
debug_speed = 12000

; Enable RTT logging because J-Link supports it
build_flags = 
    ${env.build_flags}
    -D USE_SEGGER_RTT=1

; ==========================================================
; ENVIRONMENT 2: OLIMEX ARM-USB-TINY-H
; ==========================================================
[env:olimex_tiny_h]
extends = env
upload_protocol = custom
debug_tool = custom

; Disable RTT logging to prevent Olimex from crashing
build_flags = 
    ${env.build_flags}
    -D USE_SEGGER_RTT=0

; Custom OpenOCD setup for Olimex TINY-H
debug_server =
  ${platformio.packages_dir}/tool-openocd/bin/openocd
  -f interface/ftdi/olimex-arm-usb-tiny-h.cfg
  -f target/stm32f4x.cfg
  -c "adapter speed 2000"


upload_command = ${platformio.packages_dir}/tool-openocd/bin/openocd -f interface/ftdi/olimex-arm-usb-tiny-h.cfg -f target/stm32f4x.cfg -c "adapter speed 2000" -c "program .pio/build/${PIOENV}/firmware.elf verify reset exit"

; ==========================================================
; ENVIRONMENT 3: OLIMEX ARM-USB-OCD-H
; ==========================================================

[env:olimex_ocd_h]
extends = env
upload_protocol = custom
debug_tool = custom

; Disable RTT logging to prevent Olimex from crashing
build_flags = 
    ${env.build_flags}
    -D USE_SEGGER_RTT=0

; Custom OpenOCD setup for Olimex OCD-H
debug_server =
  ${platformio.packages_dir}/tool-openocd/bin/openocd
  -f interface/ftdi/olimex-arm-usb-ocd-h.cfg
  -f target/stm32f4x.cfg
  -c "adapter speed 2000"

; IMPORTANT: The upload_command MUST remain as a single continuous line. 
; Breaking it into multiple lines (multiline) will cause parsing errors 
; in PlatformIO/OpenOCD on macOS/Linux and lead to "Debug Adapter" errors.
upload_command = ${platformio.packages_dir}/tool-openocd/bin/openocd -f interface/ftdi/olimex-arm-usb-ocd-h.cfg -f target/stm32f4x.cfg -c "adapter speed 2000" -c "program .pio/build/${PIOENV}/firmware.elf verify reset exit"


; ===============================================================================
; ENVIRONMENT 3: OLIMEX ARM-USB-OCD-H with changed PID VID  to ENABLE VIRTUAL COM
; ===============================================================================

[env:olimex_ocd_h_VirtualCOM]
extends = env
upload_protocol = custom
debug_tool = custom

build_flags = 
    ${env.build_flags}
    -D USE_SEGGER_RTT=0


debug_server =
  "${platformio.packages_dir}/tool-openocd/bin/openocd"
  -s "${platformio.packages_dir}/tool-openocd/scripts"
  -f interface/ftdi/olimex-arm-usb-ocd-h.cfg
  -c "ftdi_vid_pid 0x0403 0x6010"
  -f target/stm32f4x.cfg
  -c "adapter speed 2000"
; IMPORTANT: The upload_command MUST remain as a single continuous line. 
; Breaking it into multiple lines (multiline) will cause parsing errors 
; in PlatformIO/OpenOCD on macOS/Linux and lead to "Debug Adapter" errors.
upload_command = "${platformio.packages_dir}/tool-openocd/bin/openocd" -s "${platformio.packages_dir}/tool-openocd/scripts" -f interface/ftdi/olimex-arm-usb-ocd-h.cfg -c "ftdi_vid_pid 0x0403 0x6010" -f target/stm32f4x.cfg -c "adapter speed 2000" -c "program .pio/build/${PIOENV}/firmware.elf verify reset exit"